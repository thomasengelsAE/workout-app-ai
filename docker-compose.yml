services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fitness
      POSTGRES_PASSWORD: fitness
      POSTGRES_DB: fitness
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fitness']
      interval: 5s
      timeout: 5s
      retries: 5

  fake-gcs-server:
    image: fsouza/fake-gcs-server:latest
    command: -scheme http -port 4443 -backend memory
    ports:
      - '4443:4443'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4443/']
      interval: 5s
      timeout: 5s
      retries: 5

  fake-gcs-setup:
    image: curlimages/curl:latest
    depends_on:
      fake-gcs-server:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      curl -X POST 'http://fake-gcs-server:4443/storage/v1/b'
        -H 'Content-Type: application/json'
        -d '{\"name\":\"fitness\"}'
      && echo 'GCS bucket ready'
      "

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: dev-mem
    ports:
      - '8081:8080'
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8080/health/ready || exit 1']
      interval: 15s
      timeout: 10s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://fitness:fitness@postgres:5432/fitness
    ports:
      - '3001:3000'
    env_file:
      - .env

volumes:
  postgres_data:
